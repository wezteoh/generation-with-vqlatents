defaults:
  - data: mnist_b128
  - model: score_sde_ncsnv2_raw
  - _self_

seed: 42

hardware:
  use_gpu: true
  gpu_devices: 1

wandb:
  enabled: true
  project: score-sde-raw-training
  entity: null
  name: null
  save_dir: ./wandb
  log_model: false

trainer:
  lightning:
    max_epochs: 200
    accelerator: auto
    devices: 1
    precision: 32
    log_every_n_steps: 20
    check_val_every_n_epoch: null
    val_check_interval: 500
    deterministic: false
    fast_dev_run: false

  optim:
    learning_rate: 0.0001

  val_logging:
    enabled: true
    num_samples: 8
    log_every_n_val_epochs: 2
    sample_eps: 1e-3
    sample_n_steps: null

hydra:
  run:
    dir: .
  output_subdir: null

