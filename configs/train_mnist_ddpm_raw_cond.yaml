defaults:
  - data: mnist_labeled
  - model: ddpm_raw
  - _self_

seed: 42

hardware:
  use_gpu: true
  gpu_devices: 1

wandb:
  enabled: true
  project: ddpm-raw-cond-training
  entity: null
  name: null
  save_dir: ./wandb
  log_model: false

trainer:
  lightning:
    max_epochs: 200
    accelerator: auto
    devices: 1
    precision: 32
    log_every_n_steps: 20
    check_val_every_n_epoch: null
    val_check_interval: 500
    deterministic: false
    fast_dev_run: false

  optim:
    learning_rate: 0.00001

  val_logging:
    enabled: true
    num_samples: 8
    log_every_n_val_epochs: 2
    sample_fid:
      enabled: false
      every_n_val_epochs: 5
      num_real_samples: 512
      num_gen_samples: 512
      feature: 2048

# Class-conditional DDPM + CFG (overrides defaults from model/ddpm_raw.yaml)
model:
  conditioning:
    mode: class
    num_classes: 10
    label_key: label
    unconditional_prob: 0.1
  sampling:
    clip_denoised: false
    guidance_scale: 3.0
    # method: ancestral_sampling  # or dpmsolver for faster val samples (see model/ddpm_raw.yaml)

hydra:
  run:
    dir: .
  output_subdir: null
