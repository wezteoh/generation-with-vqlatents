defaults:
  - data: mnist
  - model: vqvae_2downsampling
  - _self_

seed: 42

hardware:
  use_gpu: true
  gpu_devices: 1

wandb:
  enabled: true
  project: vqvae-training
  entity: null
  name: vqvae_mnist_2downsampling_256embed_3dim_1e-4lr
  save_dir: ./wandb
  log_model: false

trainer:
  checkpoint:
    monitor_metric: rec_loss

  lightning:
    max_epochs: 15
    accelerator: auto
    devices: 1
    precision: 32
    log_every_n_steps: 20
    check_val_every_n_epoch: null
    val_check_interval: 250
    deterministic: false
    fast_dev_run: false

  optim:
    learning_rate: 0.0001
    betas: [0.9, 0.95]
    weight_decay: 0.0
    scheduler:
      name: warmup_cosine
      warmup_steps: 500
      min_lr_ratio: 0.1
      interval: step

  val_logging:
    enabled: true
    num_samples: 8
    log_every_n_val_epochs: 1
    rfid:
      enabled: false
      feature: 2048
      max_samples: 0

hydra:
  run:
    dir: .
  output_subdir: null