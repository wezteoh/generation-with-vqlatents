defaults:
  - data: mnist
  - model: vqvae
  - _self_

seed: 42

hardware:
  use_gpu: true
  gpu_devices: 1

wandb:
  enabled: true
  project: vqvae-training
  entity: null
  name: null
  save_dir: ./wandb
  log_model: false

trainer:
  lightning:
    max_epochs: 20
    accelerator: auto
    devices: 1
    precision: 32
    log_every_n_steps: 20
    check_val_every_n_epoch: null
    val_check_interval: 250
    deterministic: false
    fast_dev_run: false

  optim:
    learning_rate: 0.0002
    betas: [0.9, 0.95]
    weight_decay: 0.0
    scheduler:
      name: warmup_cosine
      warmup_steps: 500
      min_lr_ratio: 0.1
      interval: step

  val_logging:
    enabled: true
    num_samples: 8
    log_every_n_val_epochs: 1

hydra:
  run:
    dir: .
  output_subdir: null
