name: dsm_raw

# DSM on raw images (no first-stage VQ). in_channels and image_size from data config.
base_channels: 64

# Sigma schedule for annealed DSM (exponential between max and min).
min_sigma: 0.01
max_sigma: 1.0
num_sigmas: 10

anneal_power: 2.0
use_annealed_loss: true

# CondRefineNet backbone.
score_backbone: cond_refinenet

# Exponential moving average (EMA) over the score network parameters.
use_ema: true
ema_decay: 0.999
