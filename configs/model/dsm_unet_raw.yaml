name: dsm_raw

# DSM on raw images (no first-stage VQ). in_channels and image_size from data config.
base_channels: 32

# Sigma schedule for annealed DSM (exponential between max and min).
min_sigma: 0.01
max_sigma: 1.0
num_sigmas: 10

anneal_power: 2.0
use_annealed_loss: true

# U-Net backbone (default).
score_backbone: unet
