# Canonical DDPM: raw pixels if `vq_ckpt_path` is null/absent; latent if set.
# Same hyperparameters as `ddpm_raw.yaml` / `ddpm_latent.yaml`.
name: ddpm

# Set to a VQ-VAE checkpoint path (with sibling config.yaml) for latent DDPM.
vq_ckpt_path: null

timesteps: 1000
beta_schedule: linear
linear_start: 1.0e-4
linear_end: 2.0e-2
cosine_s: 8.0e-3

parameterization: eps
loss_type: l2
l_simple_weight: 1.0
original_elbo_weight: 0.0

base_channels: 32
num_res_blocks: 2
attention_resolutions: null
channel_mult: [1, 2, 4]
dropout: 0.0

logit_transform: false

use_ema: false
ema_decay: 0.999

# See configs/model/ddpm_raw.yaml for `sampling` (method, dpmsolver_*, clip, guidance).
sampling: null
