name: vqvae
n_embed: 16
embed_dim: 16
learning_rate: 0.0002
betas: [0.9, 0.95]
weight_decay: 0.0
image_key: image

val_logging:
  enabled: true
  num_samples: 8
  log_every_n_val_epochs: 1

scheduler:
  name: warmup_cosine
  warmup_steps: 500
  min_lr_ratio: 0.1
  interval: step

ddconfig:
  ch: 8
  out_ch: 1
  ch_mult: [1, 2, 4, 8]
  num_res_blocks: 2
  attn_resolutions: []
  dropout: 0.0
  resamp_with_conv: true
  in_channels: 1
  resolution: 32
  z_channels: 8
  double_z: false
  num_groups: 8
