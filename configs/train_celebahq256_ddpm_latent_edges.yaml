defaults:
  - data: celebahq256_edges
  - model: ddpm
  - _self_

seed: 42

hardware:
  use_gpu: true
  gpu_devices: 1

wandb:
  enabled: true
  project: ddpm-latent-edges
  entity: null
  name: null
  save_dir: ./wandb
  log_model: false

trainer:
  lightning:
    max_epochs: 200
    accelerator: auto
    devices: 1
    precision: 32
    log_every_n_steps: 20
    check_val_every_n_epoch: 1
    val_check_interval: null
    deterministic: false
    fast_dev_run: false

  optim:
    learning_rate: 5.0e-6

  val_logging:
    enabled: true
    num_samples: 12
    log_every_n_val_epochs: 1
    sample_fid:
      enabled: true
      every_n_val_epochs: 1
      num_real_samples: 512
      num_gen_samples: 512
      feature: 2048

model:
  vq_ckpt_path: checkpoints/v79q68l8/last.ckpt
  n_embed: 8192
  embed_dim: 3
  conditioning:
    mode: context
    context_key: context
    context_apply: concat
    cond_channels: 3
    unconditional_prob: 0.1
    context_encoder:
      type: spatial_rescaler
      n_stages: 2
      multiplier: 0.5
      method: bilinear
      in_channels: 1
      out_channels: 3
      bias: false
  sampling:
    clip_denoised: false
    guidance_scale: 3.0
    method: dpmsolver
    dpmsolver_steps: 20
    dpmsolver_order: 3
  image_key: image
  timesteps: 1000
  beta_schedule: linear
  linear_start: 0.0015
  linear_end: 0.0195

  parameterization: eps
  loss_type: l2
  l_simple_weight: 1.0
  original_elbo_weight: 0.0

  base_channels: 128
  num_res_blocks: 2
  attention_resolutions: [8, 4, 2]
  channel_mult: [1, 2, 3, 4]
  num_head_channels: 32
  dropout: 0.0

  use_ema: true
  ema_decay: 0.999

hydra:
  run:
    dir: .
  output_subdir: null
